				<!-- Main -->
					<div id="main" class="alt">

						<!-- One -->
							<section id="one">
								<div class="inner">
									<header class="major">
										<h1>Contact Us</h1>
									</header>
									<span class="image main"><img src="images/pic11.jpg" alt="" /></span>
									<form method="post" action="https://formspree.io/f/mldrydzg" target="_blank">
										<div class="row">
											<div class="col-6">
												<input type="text" name="demo-name" id="demo-name" placeholder="Name" />
											</div>
											<div class="col-6">
												<input type="email" name="demo-email" id="demo-email" placeholder="Email" />
											</div>
										</div>
										
										
										<br/>
										<select name="demo-category" id="demo-category" onchange="updatePlaceholder()">
											<option value="">- Category -</option>
											<option value="build">Get a computer</option>
											<option value="repair">Repairs</option>
											<option value="upgrade">Upgrades</option>
											<option value="misc">Miscellaneous</option>
										</select>
										<br/>
										<textarea name="demo-message" id="demo-message" placeholder="Enter your message" rows="6"></textarea>
										<br/>
										<div class="col-12">
											<ul class="actions">
												<li><input type="submit" value="Send Message" class="primary" /></li>
												<li><input type="reset" value="Reset" /></li>
											</ul>
										</div>
									</form>
									<script>
										function updatePlaceholder() {
											var category = document.getElementById("demo-category").value;
											var messageField = document.getElementById("demo-message");
										
											switch (category) {
												case "build":
													messageField.placeholder = "Please include your price range, particular spec you want, and when would be the best time to contact you.";
													break;
												case "repair":
													messageField.placeholder = "Please include your current computer spec, who built it or if it was prebuilt, and what the problem seems to be";
													break;
												case "upgrade":
													messageField.placeholder = "List the components you currently have, which ones you wish to upgrade, and your performance goals.";
													break;
												case "misc":
													messageField.placeholder = "Enter any other inquiry or request.";
													break;
												default:
													messageField.placeholder = "Enter your message";
													break;
											}
										}
										</script>
								</div>
							</section>

					</div>
